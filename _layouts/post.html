---
layout: default
---

<article class="page post">
  <header class="page-header">
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>
